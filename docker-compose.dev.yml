# Dev override — hot-reload via bind mounts, no image builds needed.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  web:
    build: !reset null
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @flow/web dev"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - web_next:/app/apps/web/.next
    environment:
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      api:
        condition: service_started

  api:
    build: !reset null
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @flow/api dev"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      CORS_ORIGINS: http://localhost:3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4000/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 15s

volumes:
  web_node_modules:
  web_app_node_modules:
  web_next:
  api_node_modules:
  api_app_node_modules:
