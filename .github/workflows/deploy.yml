name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'asia-southeast1' }}
  GAR_REPO: flow-images
  WEB_SERVICE: flow-web
  API_SERVICE: flow-api

jobs:
  quality-gate:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm --filter @flow/web exec playwright install --with-deps chromium

      - name: Run browser regression tests
        run: pnpm --filter @flow/web test:e2e

  deploy-api:
    name: Build & deploy API
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
      id-token: write

    outputs:
      api_url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push API image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.API_SERVICE }}"
          docker build -f apps/api/Dockerfile -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}" --all-tags

      - name: Deploy API to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.API_SERVICE }}:${{ github.sha }}
          flags: |
            --port=4000
            --allow-unauthenticated
            --min-instances=0
            --max-instances=2
            --memory=512Mi
            --cpu=1
          env_vars: |
            HOST=0.0.0.0
            NODE_ENV=production

  deploy-web:
    name: Build & deploy Web
    runs-on: ubuntu-latest
    needs: deploy-api
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push Web image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.WEB_SERVICE }}"
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.learnsystemdesign.net \
            -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}" --all-tags

      - name: Deploy Web to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.WEB_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.WEB_SERVICE }}:${{ github.sha }}
          flags: |
            --port=3000
            --allow-unauthenticated
            --min-instances=0
            --max-instances=2
            --memory=512Mi
            --cpu=1
          env_vars: |
            NODE_ENV=production

      - name: Get Web URL and update API CORS
        run: |
          WEB_URL="${{ steps.deploy.outputs.url }}"
          if [ -z "$WEB_URL" ]; then
            WEB_URL=$(gcloud run services describe ${{ env.WEB_SERVICE }} \
              --region=${{ env.GCP_REGION }} --format='value(status.url)')
          fi
          CORS="https://learnsystemdesign.net,${WEB_URL}"
          echo "Setting CORS_ORIGINS to: $CORS"
          gcloud run services update ${{ env.API_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --update-env-vars="CORS_ORIGINS=$CORS"
